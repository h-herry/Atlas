# Atlas Common — 生产环境配置 / Production environment configuration
# version: v1.2.502

debug: false

spring:
  datasource:
    url: jdbc:mysql://mysql-prod:3306/atlas?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
