server:
  port: 8084

spring:
  application:
    name: atlas-purchase
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:atlas}
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8080}
        port: 8719
      datasource:
        ds1:
          nacos:
            server-addr: ${NACOS_SERVER:localhost:8848}
            namespace: ${NACOS_NAMESPACE:atlas}
            data-id: ${spring.application.name}-flow-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: flow
        ds2:
          nacos:
            server-addr: ${NACOS_SERVER:localhost:8848}
            namespace: ${NACOS_NAMESPACE:atlas}
            data-id: ${spring.application.name}-degrade-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: degrade
  datasource:
    url: jdbc:mysql://localhost:3306/atlas_purchase?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:atlas123}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

knife4j:
  enable: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

feign:
  sentinel:
    enabled: true

seata:
  tx-service-group: atlas-tx-group
  service:
    vgroup-mapping:
      atlas-tx-group: default
    grouplist:
      default: ${SEATA_SERVER:localhost:8091}
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:localhost:8848}
      namespace: ${NACOS_NAMESPACE:atlas}
      group: SEATA_GROUP
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:localhost:8848}
      namespace: ${NACOS_NAMESPACE:atlas}
      group: SEATA_GROUP

# ==================== ShardingSphere 分库分表 ====================
spring:
  shardingsphere:
    mode:
      type: Standalone
      repository:
        type: JDBC
    datasource:
      names: ds0, ds1
      ds0:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/atlas_purchase_0?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASS:atlas123}
      ds1:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/atlas_purchase_1?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASS:atlas123}
    rules:
      sharding:
        tables:
          purchase_order:
            actual-data-nodes: ds$->{0..1}.purchase_order_$->{0..3}
            database-strategy:
              standard:
                sharding-column: id
                sharding-algorithm-name: database-inline
            table-strategy:
              standard:
                sharding-column: id
                sharding-algorithm-name: purchase_order-inline
          audit_log:
            actual-data-nodes: ds$->{0..1}.audit_log_$->{0..3}
            database-strategy:
              standard:
                sharding-column: created_at
                sharding-algorithm-name: audit-log-db-inline
            table-strategy:
              standard:
                sharding-column: created_at
                sharding-algorithm-name: audit-log-tb-inline
        sharding-algorithms:
          database-inline:
            type: INLINE
            props:
              algorithm-expression: ds$->{id % 2}
          purchase_order-inline:
            type: INLINE
            props:
              algorithm-expression: purchase_order_$->{id % 4}
          audit-log-db-inline:
            type: INLINE
            props:
              algorithm-expression: ds$->{java.time.YearMonth.from(created_at).getMonthValue() % 2}
          audit-log-tb-inline:
            type: INLINE
            props:
              algorithm-expression: audit_log_$->{java.time.YearMonth.from(created_at).getMonthValue() % 4}
    props:
      sql-show: false

# ==================== 多维度比价评分权重 / Multi-Dimension Comparison Score Weights ====================
# 四项权重之和应为 100 / The sum of four weights must equal 100
inquiry:
  score:
    weights:
      price: 50        # 价格得分权重 / Price score weight
      delivery: 20     # 交期得分权重 / Delivery score weight
      quality: 15      # 质量资质得分权重 / Quality & certification score weight
      history: 15      # 历史绩效得分权重 / Historical performance score weight
