spring:
  application:
    name: atlas-supplier
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:atlas}
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true
        shared-configs:
          - data-id: atlas-common.yaml
            group: DEFAULT_GROUP
            refresh: true
