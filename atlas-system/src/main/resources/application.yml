server:
  port: 8092

spring:
  application:
    name: atlas-system
  datasource:
    url: jdbc:mysql://localhost:3306/atlas?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  redis:
    host: localhost
    port: 6379

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j API 文档 / Knife4j API documentation
knife4j:
  enable: true
  setting:
    language: zh-CN

# 日志 / Logging
logging:
  level:
    com.atlas.system: DEBUG
    com.atlas.common.security: DEBUG
