version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: atlas-mysql
    environment:
      MYSQL_ROOT_PASSWORD: atlas123
      MYSQL_DATABASE: atlas_user
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass atlas123 --appendonly yes
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "atlas123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: atlas-rmq-namesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
    command: sh mqnamesrv
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -an | grep 9876"]
      interval: 10s
      timeout: 5s
      retries: 5

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: atlas-rmq-broker
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
