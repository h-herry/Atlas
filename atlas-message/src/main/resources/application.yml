server:
  port: 8097

spring:
  application:
    name: atlas-message
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:atlas}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:atlas}
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: atlas-common.yml
            group: DEFAULT_GROUP
            refresh: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/atlas?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  # Redis 配置（用于跨实例 Pub/Sub 广播） / Redis configuration (for cross-instance Pub/Sub broadcast)
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# MyBatis-Plus 配置 / MyBatis-Plus configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.atlas.message.model
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置 / JWT configuration
jwt:
  secret: ${JWT_SECRET:atlas-jwt-default-secret-key-2024-production-change-in-config}
  expiration: 7200

# 消息推送配置 / Message push configuration
message:
  websocket:
    # 心跳间隔 (ms) / Heartbeat interval (ms)
    heartbeat-interval: 10000
  # 消息历史保留天数 / Message history retention days
  history-retention-days: 90

# ============================================================
# 邮件通道配置 / Mail channel configuration
# ============================================================
mail:
  enabled: true
  host: ${MAIL_HOST:smtp.example.com}
  port: ${MAIL_PORT:465}
  username: ${MAIL_USERNAME:srm-noreply@example.com}
  password: ${MAIL_PASSWORD:}
  protocol: smtps
  from: "SRM系统 <${MAIL_USERNAME:srm-noreply@example.com}>"
  properties:
    mail.smtp.auth: true
    mail.smtp.ssl.enable: true

# ============================================================
# 短信通道配置 / SMS channel configuration
# ============================================================
sms:
  enabled: ${SMS_ENABLED:false}
  provider: ${SMS_PROVIDER:aliyun}     # aliyun / tencent / custom
  aliyun:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    sign-name: ${SMS_SIGN_NAME:SRM系统}
    template-codes:
      supplier-register: ${SMS_TEMPLATE_SUPPLIER_REG:SMS_123456001}
      supplier-approved: ${SMS_TEMPLATE_SUPPLIER_APPROVED:SMS_123456002}
      order-created: ${SMS_TEMPLATE_ORDER_CREATED:SMS_123456003}
      order-delivery: ${SMS_TEMPLATE_ORDER_DELIVERY:SMS_123456004}
      bidding-invite: ${SMS_TEMPLATE_BIDDING_INVITE:SMS_123456005}
      bidding-result: ${SMS_TEMPLATE_BIDDING_RESULT:SMS_123456006}
  tencent:
    app-id: ${TENCENT_SMS_APP_ID:}
    app-key: ${TENCENT_SMS_APP_KEY:}
    sign-name: ${TENCENT_SMS_SIGN_NAME:SRM系统}

# 日志 / Logging
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    com.atlas.message: DEBUG
    org.springframework.messaging: WARN
    org.springframework.web.socket: WARN

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
